<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>邱哥商城 · 买家端</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#f2f2f6;padding-bottom:70px;}
        .app{max-width:500px;margin:0 auto;}
        .card{background:white;border-radius:32px;padding:20px;margin:12px;}
        .btn{background:#ff6b6b;color:white;border:none;padding:12px;border-radius:60px;width:100%;cursor:pointer;font-size:16px;}
        .goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px;}
        .goods-card{background:white;border-radius:32px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer;}
        .goods-img{width:100%;aspect-ratio:1;object-fit:cover;}
        .goods-info{padding:12px;}
        .goods-price{color:#ff3b30;font-weight:700;font-size:18px;}
        .balance-card{background:linear-gradient(135deg,#FFEAA7,#FFD93D);border-radius:32px;padding:12px 20px;margin:12px;display:flex;justify-content:space-between;align-items:center;}
        .balance-amount{font-size:24px;font-weight:800;color:#D45A00;}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);display:flex;padding:8px 0 16px;border-top:0.5px solid #ddd;max-width:500px;margin:0 auto;}
        .nav-item{flex:1;text-align:center;font-size:12px;color:#8e8e93;padding:6px 0;cursor:pointer;}
        .nav-item.active{color:#ff6b6b;}
        .page{display:none;}
        .active-page{display:block;}
        input{padding:12px;border:1px solid #ddd;border-radius:60px;width:100%;margin:8px 0;font-size:16px;}
        .cart-item{background:white;margin:12px;padding:12px;border-radius:28px;display:flex;gap:12px;align-items:center;}
        .cart-img{width:60px;height:60px;border-radius:24px;object-fit:cover;}
        .remove-btn{background:#ffe7e5;border:none;padding:6px 12px;border-radius:60px;color:#ff3b30;cursor:pointer;}
        .signin-btn{background:linear-gradient(135deg,#FF8C42,#FF6F61);color:white;border:none;padding:8px 16px;border-radius:60px;font-weight:600;cursor:pointer;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;}
    </style>
</head>
<body>
<div class="app">
    <div id="loginPage" class="page active-page">
        <div class="card" style="text-align:center;margin-top:50px;">
            <h2 style="margin-bottom:20px;">🛍️ 邱哥商城</h2>
            <p style="color:#666;margin-bottom:20px;">请输入手机号登录/注册</p>
            <input type="tel" id="phoneInput" placeholder="手机号" maxlength="11">
            <button id="loginBtn" class="btn">登录 / 注册</button>
        </div>
    </div>

    <div id="homePage" class="page">
        <div style="padding:12px;background:white;position:sticky;top:0;">
            <input type="text" id="searchInput" placeholder="🔍 搜索商品...">
        </div>
        <div id="goodsList" class="goods-grid"></div>
    </div>

    <div id="profilePage" class="page">
        <div class="balance-card">
            <span>📱 <span id="userPhone">---</span></span>
            <span>💰 <span id="balance" class="balance-amount">0</span></span>
        </div>
        <div class="flex-between" style="margin:0 12px 12px 12px;">
            <button id="signBtn" class="signin-btn">🎁 每日签到</button>
            <button id="cartBtn" style="background:#fff2f0;color:#ff6b6b;border:none;padding:8px 20px;border-radius:60px;">🛒 购物车</button>
            <button id="ordersBtn" style="background:#f0f0f4;border:none;padding:8px 20px;border-radius:60px;">📦 订单</button>
        </div>
        <div id="contentArea"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-page="home">🏠 首页</div>
        <div class="nav-item" data-page="profile">👤 我的</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fikeaggpeyrdozeazrzq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SMZZ50gLsJ1agjBehklO_Q_jsD7USPt';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentPhone = '';
    let products = [];
    let currentUser = null;

    async function loadProducts() {
        let { data, error } = await supabase.from('products').select('*').eq('on_shelf', true);
        if(error) console.log('加载商品错误:', error);
        if(data) products = data;
        else products = [];
        renderHome();
    }

    async function loadUser(phone) {
        let { data, error } = await supabase.from('users').select('*').eq('phone', phone);
        if(error) console.log('加载用户错误:', error);
        if(data && data.length > 0) {
            currentUser = data[0];
        } else {
            currentUser = { phone: phone, balance: 100, cart: [], orders: [], lastSign: '' };
            let { error: insertError } = await supabase.from('users').insert(currentUser);
            if(insertError) console.log('创建用户错误:', insertError);
        }
        return currentUser;
    }

    async function saveUser() {
        let { error } = await supabase.from('users').update({
            balance: currentUser.balance,
            cart: currentUser.cart,
            orders: currentUser.orders,
            lastSign: currentUser.lastSign
        }).eq('phone', currentUser.phone);
        if(error) console.log('保存用户错误:', error);
    }

    function renderHome() {
        let keyword = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = products.filter(p => p.name && p.name.toLowerCase().includes(keyword));
        let container = document.getElementById('goodsList');
        if(!container) return;
        container.innerHTML = filtered.map(p => `
            <div class="goods-card" onclick="buyNow(${p.id})">
                <img class="goods-img" src="${p.img || 'https://picsum.photos/id/20/200/200'}">
                <div class="goods-info">
                    <div><strong>${p.name}</strong></div>
                    <div class="goods-price">¥${p.price}</div>
                    <button class="btn-cart" onclick="event.stopPropagation();addToCart(${p.id})" style="background:#fff0ee;color:#ff6b6b;padding:6px;border-radius:60px;width:100%;border:none;margin-top:6px;">🛒 购物车</button>
                </div>
            </div>
        `).join('');
    }

    async function addToCart(pid) {
        let p = products.find(p=>p.id===pid);
        if(!p) return;
        if(!currentUser.cart) currentUser.cart = [];
        let exist = currentUser.cart.find(i=>i.productId===pid);
        if(exist) exist.quantity++;
        else currentUser.cart.push({productId:pid, quantity:1});
        await saveUser();
        alert('已加入购物车');
    }

    async function buyNow(pid) {
        let p = products.find(p=>p.id===pid);
        if(!p) return;
        if(!currentUser) { alert('请先登录'); return; }
        if(currentUser.balance < p.price) { alert('余额不足！'); return; }
        currentUser.balance -= p.price;
        if(!currentUser.orders) currentUser.orders = [];
        currentUser.orders.unshift({
            id: Date.now(),
            items: [{productId:pid, quantity:1}],
            total: p.price,
            status: '待发货',
            tracking: '',
            createTime: new Date().toLocaleString()
        });
        await saveUser();
        alert(`购买成功！支付 ¥${p.price}，余额 ¥${currentUser.balance.toFixed(2)}`);
        document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
    }

    function renderCart() {
        if(!currentUser.cart || currentUser.cart.length === 0) {
            document.getElementById('contentArea').innerHTML = '<div class="card" style="text-align:center;">🛒 购物车空空如也</div>';
            return;
        }
        let total = 0;
        let html = '';
        currentUser.cart.forEach(item => {
            let p = products.find(p=>p.id===item.productId);
            if(p) {
                total += p.price * item.quantity;
                html += `<div class="cart-item">
                    <img class="cart-img" src="${p.img}">
                    <div style="flex:1"><strong>${p.name}</strong><br>¥${p.price} × ${item.quantity}</div>
                    <button class="remove-btn" data-id="${item.productId}">删除</button>
                </div>`;
            }
        });
        html += `<div class="card" style="text-align:center;">
            <div style="font-size:18px;font-weight:bold;">合计：¥${total}</div>
            <button id="checkoutBtn" style="background:#ff6b6b;color:white;border:none;padding:12px 24px;border-radius:60px;margin-top:12px;">去结算</button>
        </div>`;
        document.getElementById('contentArea').innerHTML = html;
        
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.onclick = async () => {
                currentUser.cart = currentUser.cart.filter(i => i.productId !== parseInt(btn.dataset.id));
                await saveUser();
                renderCart();
            };
        });
        document.getElementById('checkoutBtn')?.addEventListener('click', async () => {
            if(currentUser.balance < total) { alert(`余额不足！需要 ¥${total}，当前 ¥${currentUser.balance.toFixed(2)}`); return; }
            currentUser.balance -= total;
            currentUser.orders.unshift({
                id: Date.now(),
                items: [...currentUser.cart],
                total: total,
                status: '待发货',
                tracking: '',
                createTime: new Date().toLocaleString()
            });
            currentUser.cart = [];
            await saveUser();
            alert(`支付成功！余额 ¥${currentUser.balance.toFixed(2)}`);
            renderCart();
            document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
        });
    }

    function renderOrders() {
        if(!currentUser.orders) currentUser.orders = [];
        let pending = currentUser.orders.filter(o => o.status === '待发货' || o.status === '已发货');
        if(pending.length === 0) {
            document.getElementById('contentArea').innerHTML = '<div class="card" style="text-align:center;">📭 暂无订单</div>';
            return;
        }
        let html = '';
        pending.forEach(order => {
            html += `<div class="card">
                <div><strong>订单号：${order.id}</strong></div>
                <div>时间：${order.createTime}</div>`;
            order.items.forEach(it => {
                let p = products.find(p=>p.id===it.productId);
                html += `<div>${p?.name} x${it.quantity}</div>`;
            });
            html += `<div><strong>总计：¥${order.total}</strong></div>
                <div>状态：${order.status}</div>`;
            if(order.tracking) html += `<div style="background:#eef2ff;padding:8px;border-radius:40px;margin-top:8px;">📦 物流单号：${order.tracking}</div>`;
            if(order.status === '已发货') {
                html += `<button class="confirmBtn" data-id="${order.id}" style="background:#34c759;border:none;border-radius:40px;padding:8px;margin-top:12px;color:white;">确认收货</button>`;
            }
            html += `</div>`;
        });
        document.getElementById('contentArea').innerHTML = html;
        document.querySelectorAll('.confirmBtn').forEach(btn => {
            btn.onclick = async () => {
                let oid = parseInt(btn.dataset.id);
                let ord = currentUser.orders.find(o => o.id === oid);
                if(ord) ord.status = '已完成';
                await saveUser();
                renderOrders();
                alert('已确认收货');
            };
        });
    }

    async function doSign() {
        let today = new Date().toISOString().slice(0,10);
        if(currentUser.lastSign === today) { alert('今天已经签到过了！'); return; }
        let amount = (Math.random() * 2 + 0.5).toFixed(2);
        currentUser.balance += parseFloat(amount);
        currentUser.lastSign = today;
        await saveUser();
        alert(`签到成功！获得 ¥${amount}\n当前余额：¥${currentUser.balance.toFixed(2)}`);
        document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
    }

    document.getElementById('loginBtn')?.addEventListener('click', async () => {
        let phone = document.getElementById('phoneInput').value.trim();
        if(!phone || phone.length < 7) { alert('请输入有效手机号'); return; }
        currentPhone = phone;
        await loadProducts();
        await loadUser(currentPhone);
        document.getElementById('loginPage').classList.remove('active-page');
        document.getElementById('homePage').classList.add('active-page');
        document.getElementById('userPhone').innerText = currentPhone;
        document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
        renderHome();
        document.querySelector('.nav-item[data-page="home"]').classList.add('active');
    });

    document.getElementById('cartBtn')?.addEventListener('click', () => { renderCart(); });
    document.getElementById('ordersBtn')?.addEventListener('click', () => { renderOrders(); });
    document.getElementById('signBtn')?.addEventListener('click', () => { doSign(); });
    document.getElementById('searchInput')?.addEventListener('input', () => { renderHome(); });

    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(btn.dataset.page + 'Page').classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(btn.dataset.page === 'profile') {
                document.getElementById('balance').innerText = currentUser ? currentUser.balance.toFixed(2) : '0';
                document.getElementById('contentArea').innerHTML = '';
            }
            if(btn.dataset.page === 'home') renderHome();
        });
    });

    loadProducts();
</script>
</body>
</html>
