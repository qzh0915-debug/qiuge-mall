<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>邱哥商城 · 买家端</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#f2f2f6;padding-bottom:70px;}
        .app{max-width:500px;margin:0 auto;}
        .card{background:white;border-radius:32px;padding:20px;margin:12px;}
        .btn{background:#ff6b6b;color:white;border:none;padding:12px;border-radius:60px;width:100%;cursor:pointer;}
        .goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px;}
        .goods-card{background:white;border-radius:32px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer;}
        .goods-img{width:100%;aspect-ratio:1;object-fit:cover;}
        .goods-info{padding:12px;}
        .goods-price{color:#ff3b30;font-weight:700;}
        .balance-card{background:linear-gradient(135deg,#FFEAA7,#FFD93D);border-radius:32px;padding:12px 20px;margin:12px;display:flex;justify-content:space-between;}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);display:flex;padding:8px 0 16px;border-top:0.5px solid #ddd;max-width:500px;margin:0 auto;}
        .nav-item{flex:1;text-align:center;font-size:12px;color:#8e8e93;cursor:pointer;}
        .nav-item.active{color:#ff6b6b;}
        .page{display:none;}
        .active-page{display:block;}
        input{padding:12px;border:1px solid #ddd;border-radius:60px;width:100%;margin:8px 0;}
        .cart-item{background:white;margin:12px;padding:12px;border-radius:28px;display:flex;gap:12px;align-items:center;}
        .remove-btn{background:#ffe7e5;border:none;padding:6px 12px;border-radius:60px;color:#ff3b30;}
    </style>
</head>
<body>
<div class="app">
    <!-- 登录/注册页 -->
    <div id="loginPage" class="page active-page">
        <div class="card" style="text-align:center;">
            <h2>🛍️ 邱哥商城</h2>
            <p style="color:#666;margin:16px 0;">请输入手机号登录/注册</p>
            <input type="tel" id="phoneInput" placeholder="手机号" maxlength="11">
            <button id="loginBtn" class="btn">登录 / 注册</button>
        </div>
    </div>

    <!-- 主页 -->
    <div id="homePage" class="page">
        <div style="padding:12px;background:white;"><input type="text" id="searchInput" placeholder="🔍 搜索商品"></div>
        <div id="goodsList" class="goods-grid"></div>
    </div>

    <!-- 我的页面 -->
    <div id="profilePage" class="page">
        <div class="card" style="background:linear-gradient(135deg,#FFEAA7,#FFD93D);">
            <div style="display:flex;justify-content:space-between;">
                <span>📱 {{phone}}</span>
                <span>💰 ¥<span id="balance">0</span></span>
            </div>
            <button id="signBtn" style="margin-top:12px;background:#ff8c42;color:white;border:none;padding:8px;border-radius:60px;">🎁 每日签到</button>
        </div>
        <div style="display:flex;gap:12px;margin:12px;">
            <div id="cartBtn" style="flex:1;background:#fff2f0;padding:12px;border-radius:60px;text-align:center;">🛒 购物车 🛒</div>
            <div id="ordersBtn" style="flex:1;background:#f0f0f4;padding:12px;border-radius:60px;text-align:center;">📦 我的订单</div>
        </div>
        <div id="contentArea"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="home">🏠 首页</div>
        <div class="nav-item" data-page="profile">👤 我的</div>
    </div>
</div>

<script>
    // 云端数据key
    const STORAGE_KEY = 'qg_mall_data';
    let currentPhone = '';
    let products = [];
    let allUsers = {};

    // 加载云端数据
    function loadData() {
        let data = localStorage.getItem(STORAGE_KEY);
        if(data) {
            let parsed = JSON.parse(data);
            allUsers = parsed.users || {};
            products = parsed.products || [
                {id:"p1",name:"线条小狗",price:29,img:"https://picsum.photos/id/20/300/300",desc:"可爱小狗",stock:99,onShelf:true},
                {id:"p2",name:"情书卷轴",price:8,img:"https://picsum.photos/id/1/300/300",desc:"手写卷轴",stock:99,onShelf:true},
                {id:"p3",name:"坚果礼盒",price:88,img:"https://picsum.photos/id/108/300/300",desc:"健康零食",stock:99,onShelf:true}
            ];
        } else {
            allUsers = {};
            products = [
                {id:"p1",name:"线条小狗",price:29,img:"https://picsum.photos/id/20/300/300",desc:"可爱小狗",stock:99,onShelf:true},
                {id:"p2",name:"情书卷轴",price:8,img:"https://picsum.photos/id/1/300/300",desc:"手写卷轴",stock:99,onShelf:true},
                {id:"p3",name:"坚果礼盒",price:88,img:"https://picsum.photos/id/108/300/300",desc:"健康零食",stock:99,onShelf:true}
            ];
        }
        saveData();
    }

    function saveData() {
        let data = { users: allUsers, products: products };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        // 触发其他标签页同步
        window.dispatchEvent(new StorageEvent('storage', { key: STORAGE_KEY, newValue: JSON.stringify(data) }));
    }

    // 获取当前用户数据
    function getUser() {
        if(!allUsers[currentPhone]) {
            allUsers[currentPhone] = {
                phone: currentPhone,
                balance: 100,
                cart: [],
                orders: [],
                lastSign: ''
            };
            saveData();
        }
        return allUsers[currentPhone];
    }

    function saveUser(user) {
        allUsers[currentPhone] = user;
        saveData();
    }

    function updateUI() {
        if(!currentPhone) return;
        let user = getUser();
        document.getElementById('balance').innerText = user.balance.toFixed(2);
        renderHome();
    }

    function renderHome() {
        let keyword = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = products.filter(p => p.onShelf && p.name.toLowerCase().includes(keyword));
        document.getElementById('goodsList').innerHTML = filtered.map(p => `
            <div class="goods-card" onclick="showDetail('${p.id}')">
                <img class="goods-img" src="${p.img}">
                <div class="goods-info">
                    <div>${p.name}</div>
                    <div class="goods-price">¥${p.price}</div>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <button class="btn-cart" onclick="event.stopPropagation();addToCart('${p.id}')" style="background:#fff0ee;color:#ff6b6b;padding:6px;border-radius:60px;flex:1;">🛒</button>
                        <button class="btn-buy" onclick="event.stopPropagation();buyNow('${p.id}')" style="background:#ff6b6b;color:white;padding:6px;border-radius:60px;flex:1;">⚡</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addToCart(pid) {
        let p = products.find(p=>p.id===pid);
        if(!p) return;
        let user = getUser();
        let exist = user.cart.find(i=>i.productId===pid);
        if(exist) exist.quantity++;
        else user.cart.push({productId:pid, quantity:1});
        saveUser(user);
        alert('已加入购物车');
    }

    function buyNow(pid) {
        let p = products.find(p=>p.id===pid);
        if(!p) return;
        let user = getUser();
        if(user.balance < p.price) { alert('余额不足'); return; }
        user.balance -= p.price;
        user.orders.unshift({
            id: Date.now(),
            items: [{productId:pid, quantity:1}],
            total: p.price,
            status: '待发货',
            tracking: '',
            createTime: new Date().toLocaleString()
        });
        saveUser(user);
        alert(`购买成功！余额：¥${user.balance.toFixed(2)}`);
    }

    function showDetail(pid) { alert('详情开发中'); }

    function renderCart() {
        let user = getUser();
        if(user.cart.length===0) { document.getElementById('contentArea').innerHTML='<div class="card" style="text-align:center;">🛒 购物车空空</div>'; return; }
        let total=0;
        let html='';
        user.cart.forEach(item=>{
            let p=products.find(p=>p.id===item.productId);
            if(p){
                total+=p.price*item.quantity;
                html+=`<div class="cart-item"><img src="${p.img}" width="50" height="50" style="border-radius:24px;"><div style="flex:1"><strong>${p.name}</strong><br>¥${p.price} × ${item.quantity}</div><button class="remove-btn" data-id="${item.productId}">删除</button></div>`;
            }
        });
        html+=`<div class="card" style="text-align:center;">合计：¥${total}<br><button id="checkoutBtn" style="background:#ff6b6b;color:white;border:none;padding:12px;border-radius:60px;margin-top:12px;">去结算</button></div>`;
        document.getElementById('contentArea').innerHTML=html;
        document.querySelectorAll('.remove-btn').forEach(btn=>btn.onclick=()=>{
            user.cart=user.cart.filter(i=>i.productId!==btn.dataset.id);
            saveUser(user);
            renderCart();
        });
        document.getElementById('checkoutBtn')?.addEventListener('click',()=>{
            if(user.balance<total){ alert('余额不足'); return; }
            user.balance-=total;
            user.orders.unshift({
                id: Date.now(),
                items: [...user.cart],
                total: total,
                status: '待发货',
                tracking: '',
                createTime: new Date().toLocaleString()
            });
            user.cart=[];
            saveUser(user);
            alert(`支付成功！余额：¥${user.balance.toFixed(2)}`);
            renderCart();
        });
    }

    function renderOrders() {
        let user = getUser();
        let pending = user.orders.filter(o=>o.status==='待收货'||o.status==='已发货');
        if(pending.length===0){ document.getElementById('contentArea').innerHTML='<div class="card" style="text-align:center;">📭 暂无订单</div>'; return; }
        let html='';
        pending.forEach(order=>{
            html+=`<div class="card"><div>订单号：${order.id}</div><div>时间：${order.createTime}</div>`;
            order.items.forEach(it=>{
                let p=products.find(p=>p.id===it.productId);
                html+=`<div>${p?.name} x${it.quantity}</div>`;
            });
            html+=`<div>总计：¥${order.total}</div><div>状态：${order.status}</div>`;
            if(order.tracking) html+=`<div style="background:#eef2ff;padding:8px;border-radius:40px;">📦 单号：${order.tracking}</div>`;
            if(order.status==='已发货') html+=`<button class="confirmBtn" data-id="${order.id}" style="background:#34c759;border:none;border-radius:40px;padding:8px;margin-top:8px;">确认收货</button>`;
            html+=`</div>`;
        });
        document.getElementById('contentArea').innerHTML=html;
        document.querySelectorAll('.confirmBtn').forEach(btn=>btn.onclick=()=>{
            let oid=parseInt(btn.dataset.id);
            let ord=user.orders.find(o=>o.id===oid);
            if(ord) ord.status='已完成';
            saveUser(user);
            renderOrders();
        });
    }

    function doSign() {
        let user = getUser();
        let today = new Date().toISOString().slice(0,10);
        if(user.lastSign===today){ alert('今天已签到'); return; }
        let amount = (Math.random()*2+0.5).toFixed(2);
        user.balance += parseFloat(amount);
        user.lastSign = today;
        saveUser(user);
        alert(`签到成功！获得 ¥${amount}，余额 ¥${user.balance.toFixed(2)}`);
        updateUI();
    }

    document.getElementById('loginBtn')?.addEventListener('click',()=>{
        let phone = document.getElementById('phoneInput').value.trim();
        if(!phone || phone.length<7){ alert('请输入有效手机号'); return; }
        currentPhone = phone;
        loadData();
        if(!allUsers[currentPhone]) getUser();
        document.getElementById('loginPage').classList.remove('active-page');
        document.getElementById('homePage').classList.add('active-page');
        updateUI();
        document.querySelector('.nav-item[data-page="home"]').classList.add('active');
    });

    document.getElementById('cartBtn')?.addEventListener('click',()=>{ renderCart(); document.getElementById('contentArea').scrollIntoView(); });
    document.getElementById('ordersBtn')?.addEventListener('click',()=>{ renderOrders(); });
    document.getElementById('signBtn')?.addEventListener('click',()=>{ doSign(); });
    document.getElementById('searchInput')?.addEventListener('input',()=>renderHome());

    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
        document.getElementById(btn.dataset.page+'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        btn.classList.add('active');
        if(btn.dataset.page==='profile'){
            let user=getUser();
            document.getElementById('balance').innerText=user.balance.toFixed(2);
            document.querySelector('#profilePage .card span:first-child').innerHTML=`📱 ${currentPhone}`;
            document.getElementById('contentArea').innerHTML='';
        }
        if(btn.dataset.page==='home') renderHome();
    }));

    loadData();
</script>
</body>
</html>
