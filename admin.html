<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>商家中心 · 邱哥商城</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#f2f2f6;padding:16px;padding-bottom:80px;}
        .card{background:white;border-radius:32px;padding:20px;margin-bottom:20px;}
        .title{font-size:20px;font-weight:700;margin-bottom:16px;border-left:4px solid #ff6b6b;padding-left:12px;}
        input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:60px;margin:8px 0;}
        .btn{background:#ff6b6b;color:white;border:none;padding:12px;border-radius:60px;width:100%;cursor:pointer;}
        .upload-area{border:2px dashed #ddd;border-radius:60px;padding:20px;text-align:center;margin:10px 0;cursor:pointer;}
        .goods-item,.order-item,.user-item{border-bottom:1px solid #eee;padding:12px 0;display:flex;justify-content:space-between;align-items:center;}
        .image-preview{width:100%;max-height:150px;object-fit:contain;border-radius:24px;margin-top:10px;display:none;}
        .nav-tab{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);display:flex;padding:8px 0 16px;border-top:0.5px solid #ddd;max-width:500px;margin:0 auto;}
        .nav-item{flex:1;text-align:center;font-size:12px;color:#8e8e93;padding:6px 0;cursor:pointer;}
        .nav-item.active{color:#ff6b6b;}
        .page{display:none;}
        .active-page{display:block;}
        .tracking-input{display:flex;gap:8px;margin-top:8px;}
        .tracking-input input{flex:1;margin:0;padding:8px;}
        .badge{background:#ff6b6b;color:white;border-radius:20px;padding:2px 8px;font-size:12px;margin-left:8px;}
    </style>
</head>
<body>
<div style="max-width:500px;margin:0 auto;">
    <div id="goodsPage" class="page active-page">
        <div class="card">
            <div class="title">➕ 添加商品</div>
            <input type="text" id="prodName" placeholder="商品名称">
            <input type="number" id="prodPrice" placeholder="价格">
            <div class="upload-area" id="uploadArea">📸 点击上传图片<input type="file" id="imageUpload" accept="image/*" style="display:none;"></div>
            <img id="imagePreview" class="image-preview">
            <input type="text" id="prodDesc" placeholder="商品描述">
            <input type="number" id="prodStock" placeholder="库存" value="99">
            <button id="addProductBtn" class="btn">上架商品</button>
        </div>
        <div class="card">
            <div class="title">📦 商品管理</div>
            <div id="goodsList"></div>
        </div>
    </div>

    <div id="userPage" class="page">
        <div class="card">
            <div class="title">👥 买家管理 <span id="userCount" class="badge">0</span></div>
            <div id="userList"></div>
        </div>
    </div>

    <div id="orderPage" class="page">
        <div class="card">
            <div class="title">📋 所有订单</div>
            <div id="orderList"></div>
        </div>
    </div>

    <div class="nav-tab">
        <div class="nav-item active" data-page="goods">📦 商品</div>
        <div class="nav-item" data-page="user">👥 买家</div>
        <div class="nav-item" data-page="order">📋 订单</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'qg_mall_data';
    let products = [];
    let allUsers = {};
    let uploadedImage = null;

    function loadData() {
        let data = localStorage.getItem(STORAGE_KEY);
        if(data) {
            let parsed = JSON.parse(data);
            allUsers = parsed.users || {};
            products = parsed.products || [];
        }
        if(products.length===0){
            products = [
                {id:"p1",name:"线条小狗",price:29,img:"https://picsum.photos/id/20/300/300",desc:"可爱小狗",stock:99,onShelf:true},
                {id:"p2",name:"情书卷轴",price:8,img:"https://picsum.photos/id/1/300/300",desc:"手写卷轴",stock:99,onShelf:true},
                {id:"p3",name:"坚果礼盒",price:88,img:"https://picsum.photos/id/108/300/300",desc:"健康零食",stock:99,onShelf:true}
            ];
        }
        saveData();
    }

    function saveData() {
        let data = { users: allUsers, products: products };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        window.dispatchEvent(new StorageEvent('storage', { key: STORAGE_KEY, newValue: JSON.stringify(data) }));
        renderAll();
    }

    function renderAll() {
        renderGoods();
        renderUsers();
        renderOrders();
    }

    function renderGoods() {
        let container = document.getElementById('goodsList');
        container.innerHTML = products.map(p => `
            <div class="goods-item">
                <div><img src="${p.img}" width="50" height="50" style="border-radius:24px;"><br><strong>${p.name}</strong><br>¥${p.price} / 库存:${p.stock}<br>${p.onShelf?'✅上架':'⏸️下架'}</div>
                <div><button class="toggle-shelf" data-id="${p.id}" style="border:1px solid #ff6b6b;border-radius:20px;padding:4px 8px;">${p.onShelf?'下架':'上架'}</button><button class="delete-prod" data-id="${p.id}" style="border:1px solid #ccc;border-radius:20px;padding:4px 8px;">删除</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.toggle-shelf').forEach(btn=>btn.onclick=()=>{ let idx=products.findIndex(p=>p.id===btn.dataset.id); if(idx!==-1){ products[idx].onShelf=!products[idx].onShelf; saveData(); } });
        document.querySelectorAll('.delete-prod').forEach(btn=>btn.onclick=()=>{ products=products.filter(p=>p.id!==btn.dataset.id); saveData(); });
    }

    function renderUsers() {
        let container = document.getElementById('userList');
        let users = Object.values(allUsers);
        document.getElementById('userCount').innerText = users.length;
        if(users.length===0){ container.innerHTML='<div style="text-align:center;color:#aaa;">暂无买家</div>'; return; }
        container.innerHTML = users.map(u => `
            <div class="user-item">
                <div><strong>📱 ${u.phone}</strong><br>💰 余额: ¥${u.balance.toFixed(2)}<br>📦 订单: ${u.orders.length}</div>
                <div><button class="add-balance" data-phone="${u.phone}" style="background:#34c759;border:none;border-radius:20px;padding:4px 8px;">➕充值</button><button class="sub-balance" data-phone="${u.phone}" style="background:#ff6b6b;border:none;border-radius:20px;padding:4px 8px;">➖扣除</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.add-balance').forEach(btn=>btn.onclick=()=>{ let amount=prompt('输入充值金额'); if(amount && !isNaN(parseFloat(amount))){ let user=allUsers[btn.dataset.phone]; if(user){ user.balance+=parseFloat(amount); saveData(); renderUsers(); alert('充值成功'); } } });
        document.querySelectorAll('.sub-balance').forEach(btn=>btn.onclick=()=>{ let amount=prompt('输入扣除金额'); if(amount && !isNaN(parseFloat(amount))){ let user=allUsers[btn.dataset.phone]; if(user){ if(user.balance>=amount) user.balance-=parseFloat(amount); else alert('余额不足'); saveData(); renderUsers(); } } });
    }

    function renderOrders() {
        let container = document.getElementById('orderList');
        let allOrders = [];
        for(let phone in allUsers){
            let user = allUsers[phone];
            user.orders.forEach(order=>{ allOrders.push({...order, userPhone:phone, userName:user.phone}); });
        }
        allOrders.sort((a,b)=>b.id-a.id);
        if(allOrders.length===0){ container.innerHTML='<div style="text-align:center;color:#aaa;">暂无订单</div>'; return; }
        container.innerHTML = allOrders.map(order => `
            <div class="order-item" style="flex-direction:column;align-items:flex-start;">
                <div><strong>买家：${order.userPhone}</strong> | 订单号：${order.id}<br>时间：${order.createTime}<br>金额：¥${order.total}<br>状态：${order.status}</div>
                <div>商品：${order.items.map(it=>{ let p=products.find(pr=>pr.id===it.productId); return `${p?.name} x${it.quantity}`; }).join(', ')}</div>
                ${order.status==='待发货' ? `<div class="tracking-input"><input type="text" id="track_${order.id}" placeholder="快递单号"><button class="shipBtn" data-id="${order.id}" data-phone="${order.userPhone}">发货</button></div>` : (order.tracking?`<div>📦 单号：${order.tracking}</div>`:'')}
            </div>
        `).join('');
        document.querySelectorAll('.shipBtn').forEach(btn=>btn.onclick=()=>{
            let oid=parseInt(btn.dataset.id);
            let phone=btn.dataset.phone;
            let tracking=document.getElementById(`track_${oid}`).value;
            if(!tracking){ alert('请输入单号'); return; }
            let user=allUsers[phone];
            if(user){
                let order=user.orders.find(o=>o.id===oid);
                if(order){
                    order.status='已发货';
                    order.tracking=tracking;
                    saveData();
                    alert('发货成功');
                }
            }
        });
    }

    document.getElementById('addProductBtn')?.addEventListener('click',()=>{
        let name=document.getElementById('prodName').value;
        let price=parseFloat(document.getElementById('prodPrice').value);
        let desc=document.getElementById('prodDesc').value;
        let stock=parseInt(document.getElementById('prodStock').value);
        if(!name||isNaN(price)){ alert('请填写完整'); return; }
        let img=uploadedImage||'https://picsum.photos/id/42/200/200';
        products.push({id:'p'+Date.now(),name,price,img,desc:desc||'好物',stock:stock||0,onShelf:true});
        saveData();
        alert('商品已上架');
        document.getElementById('prodName').value='';
        document.getElementById('prodPrice').value='';
        document.getElementById('prodDesc').value='';
        uploadedImage=null;
        document.getElementById('imagePreview').style.display='none';
    });

    document.getElementById('uploadArea')?.addEventListener('click',()=>document.getElementById('imageUpload').click());
    document.getElementById('imageUpload')?.addEventListener('change',(e)=>{
        let file=e.target.files[0];
        if(file){ let reader=new FileReader(); reader.onload=ev=>{ uploadedImage=ev.target.result; document.getElementById('imagePreview').src=uploadedImage; document.getElementById('imagePreview').style.display='block'; }; reader.readAsDataURL(file); }
    });

    document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
        document.getElementById(btn.dataset.page+'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        btn.classList.add('active');
    }));

    loadData();
</script>
</body>
</html>
