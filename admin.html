<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>商家中心 · 邱哥商城</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #f2f2f6; padding: 16px; padding-bottom: 80px; }
        .card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .title { font-size: 20px; font-weight: 700; margin-bottom: 16px; border-left: 4px solid #ff6b6b; padding-left: 12px; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e5e5ea; border-radius: 60px; margin: 8px 0; font-size: 15px; }
        .btn { background: #ff6b6b; color: white; border: none; padding: 12px; border-radius: 60px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; }
        .btn-gray { background: #e9e9ef; color: #1c1c1e; }
        .goods-item, .order-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .upload-area { border: 2px dashed #ddd; border-radius: 60px; padding: 20px; text-align: center; margin: 10px 0; cursor: pointer; background: #fafafc; }
        .image-preview { width: 100%; max-height: 150px; object-fit: contain; border-radius: 24px; margin-top: 10px; display: none; }
        .badge { background: #ff6b6b; color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; }
        .tracking-input { display: flex; gap: 8px; margin-top: 8px; }
        .tracking-input input { flex: 1; margin: 0; padding: 8px 12px; }
        .tracking-input button { padding: 8px 16px; background: #ff6b6b; color: white; border: none; border-radius: 60px; }
        .nav-tab { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); display: flex; padding: 8px 0 16px; border-top: 0.5px solid rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; padding: 6px 0; border-radius: 40px; cursor: pointer; }
        .nav-item.active { color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .page { display: none; }
        .active-page { display: block; }
        .view-store { text-align: center; margin-top: 16px; font-size: 12px; }
        .view-store a { color: #ff6b6b; text-decoration: none; }
    </style>
</head>
<body>
<div style="max-width:500px; margin:0 auto;">
    <div id="goodsPage" class="page active-page">
        <div class="card">
            <div class="title">➕ 添加商品</div>
            <input type="text" id="prodName" placeholder="商品名称">
            <input type="number" id="prodPrice" placeholder="价格">
            <div class="upload-area" id="uploadArea">📸 点击上传图片<input type="file" id="imageUpload" accept="image/*" style="display:none;"></div>
            <img id="imagePreview" class="image-preview">
            <textarea id="prodDesc" rows="2" placeholder="商品描述"></textarea>
            <input type="number" id="prodStock" placeholder="库存" value="99">
            <button id="addProductBtn" class="btn">上架商品</button>
        </div>
        <div class="card">
            <div class="title">📦 商品管理</div>
            <div id="goodsList"></div>
        </div>
    </div>

    <div id="orderPage" class="page">
        <div class="card">
            <div class="title">📋 买家订单</div>
            <div id="orderList"></div>
        </div>
    </div>

    <div id="noticePage" class="page">
        <div class="card">
            <div class="title">📢 发布公告</div>
            <input type="text" id="noticeText" placeholder="公告内容">
            <button id="postNotice" class="btn">发布公告</button>
            <div id="noticeList" style="margin-top: 16px;"></div>
        </div>
    </div>

    <div class="view-store"><a href="index.html" target="_blank">🏠 进入店铺（买家端）</a></div>

    <div class="nav-tab">
        <div class="nav-item active" data-page="goods">📦 商品</div>
        <div class="nav-item" data-page="order">📋 订单</div>
        <div class="nav-item" data-page="notice">📢 公告</div>
    </div>
</div>

<script>
    const STORAGE_PREFIX = 'qg_';
    
    let products = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'products') || '[]');
    let orders = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'orders') || '[]');
    let notices = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'notices') || '["🎉 欢迎光临邱哥商城"]');
    let uploadedImage = null;

    function saveAll() {
        localStorage.setItem(STORAGE_PREFIX + 'products', JSON.stringify(products));
        localStorage.setItem(STORAGE_PREFIX + 'orders', JSON.stringify(orders));
        localStorage.setItem(STORAGE_PREFIX + 'notices', JSON.stringify(notices));
        renderGoods();
        renderOrders();
        renderNotices();
    }

    function renderGoods() {
        const container = document.getElementById('goodsList');
        if(!container) return;
        container.innerHTML = products.map(p => `
            <div class="goods-item">
                <div><img src="${p.img}" width="50" height="50" style="border-radius: 24px; object-fit:cover;"><br><strong>${p.name}</strong><br>¥${p.price} / 库存:${p.stock}<br>${p.onShelf ? '✅上架' : '⏸️下架'}</div>
                <div><button class="toggle-shelf" data-id="${p.id}" style="border:1px solid #ff6b6b; border-radius:20px; padding:4px 10px; margin:2px;">${p.onShelf ? '下架' : '上架'}</button><button class="delete-prod" data-id="${p.id}" style="border:1px solid #ccc; border-radius:20px; padding:4px 10px;">删除</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.toggle-shelf').forEach(btn => btn.onclick = () => { let idx = products.findIndex(p=>p.id===btn.dataset.id); if(idx!==-1){ products[idx].onShelf = !products[idx].onShelf; saveAll(); } });
        document.querySelectorAll('.delete-prod').forEach(btn => btn.onclick = () => { products = products.filter(p=>p.id!==btn.dataset.id); saveAll(); });
    }

    function renderOrders() {
        const container = document.getElementById('orderList');
        if(!container) return;
        if(orders.length === 0) { container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无订单</div>'; return; }
        container.innerHTML = orders.map(order => `
            <div class="order-item" style="flex-direction:column; align-items:flex-start;">
                <div><strong>订单号:</strong> ${order.id}<br><strong>时间:</strong> ${order.createTime}<br><strong>金额:</strong> ¥${order.total}<br><strong>状态:</strong> ${order.status}</div>
                <div><strong>商品:</strong> ${order.items.map(it=>{ let p=products.find(pr=>pr.id===it.productId); return `${p?.name} x${it.quantity}`; }).join(', ')}</div>
                <div class="tracking-input">
                    <input type="text" id="track_${order.id}" placeholder="快递单号" value="${order.tracking || ''}">
                    <button class="save-track" data-id="${order.id}">保存单号</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.save-track').forEach(btn => btn.onclick = () => { let oid = parseInt(btn.dataset.id); let order = orders.find(o=>o.id===oid); let input = document.getElementById(`track_${oid}`); if(order) { order.tracking = input.value; if(order.status === '待收货') order.status = '已发货'; saveAll(); alert('物流单号已保存'); } });
    }

    function renderNotices() {
        const container = document.getElementById('noticeList');
        if(container) container.innerHTML = notices.map(n => `<div>📢 ${n}</div>`).join('');
    }

    document.getElementById('addProductBtn')?.addEventListener('click', () => {
        let name = document.getElementById('prodName').value;
        let price = parseFloat(document.getElementById('prodPrice').value);
        let desc = document.getElementById('prodDesc').value || '好物';
        let stock = parseInt(document.getElementById('prodStock').value) || 0;
        if(!name || isNaN(price)) { alert('请填写完整'); return; }
        let img = uploadedImage || 'https://picsum.photos/id/42/200/200';
        let newId = 'p' + Date.now();
        products.push({ id: newId, name, price, desc, stock, img, onShelf: true });
        saveAll();
        alert('商品已上架');
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('prodStock').value = '99';
        uploadedImage = null;
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageUpload').value = '';
    });

    document.getElementById('postNotice')?.addEventListener('click', () => {
        let txt = document.getElementById('noticeText').value;
        if(txt) { notices.unshift(txt); saveAll(); document.getElementById('noticeText').value = ''; }
    });

    document.getElementById('uploadArea')?.addEventListener('click', () => document.getElementById('imageUpload').click());
    document.getElementById('imageUpload')?.addEventListener('change', (e) => {
        let file = e.target.files[0];
        if(file) { let reader = new FileReader(); reader.onload = ev => { uploadedImage = ev.target.result; document.getElementById('imagePreview').src = uploadedImage; document.getElementById('imagePreview').style.display = 'block'; }; reader.readAsDataURL(file); }
    });

    document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(btn.dataset.page + 'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }));

    if(products.length === 0) {
        products = [
            { id: "p1", name: "线条小狗系列", price: 29, img: "https://picsum.photos/id/20/300/300", desc: "可爱毛绒玩具", stock: 35, onShelf: true },
            { id: "p2", name: "情书手写信卷轴", price: 8, img: "https://picsum.photos/id/1/300/300", desc: "插画卷轴", stock: 20, onShelf: true },
            { id: "p3", name: "每日坚果礼盒", price: 88, img: "https://picsum.photos/id/108/300/300", desc: "健康零食", stock: 50, onShelf: true }
        ];
        saveAll();
    } else { renderGoods(); renderOrders(); renderNotices(); }
</script>
</body>
</html>
